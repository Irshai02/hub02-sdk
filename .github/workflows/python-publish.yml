# Tag-gated PyPI publish for hub02-sdk.
#
# NOT TRIGGERED until both:
#   1. a tag matching `python-v*` is pushed, AND
#   2. the workflow_dispatch `confirm` input is set to `publish`.
# The actual upload step is left commented so a stray tag cannot ship a release.
# To publish later: configure PyPI trusted publishing (or PYPI_API_TOKEN),
# uncomment the upload step, push a `python-vX.Y.Z` tag.
name: python-publish

on:
  push:
    tags: ["python-v*"]
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "publish" to confirm a real release'
        required: true
        default: "dry-run"

defaults:
  run:
    working-directory: python

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: pip install -e ".[dev]"
      - run: pytest -q
      - run: python -m build
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
      #   with:
      #     packages-dir: python/dist
      - run: echo "Wheel + sdist built. Publish step intentionally disabled."
